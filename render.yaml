services:
  - type: web
    name: mysogi-sales-whatsapp-bot
    runtime: node
    plan: starter
    buildCommand: npm install && npm run ingest
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: MR_ODUN_PHONE
        value: "2348087965610"
      - key: MR_ODUN_DISPLAY
        value: "+234 808 796 5610"
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: COMPANY_NAME
        value: Mysogi
